name: Build & publish static site

# Builds the Next.js static export on every push to main and publishes the
# generated `out/` folder to the `deploy` branch. Hostinger's Git tool then
# serves the `deploy` branch (which contains the baked site at its root),
# instead of the raw source — fixing the 403 from deploying un-built source.

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: write # needed to push the built site to the deploy branch

# Avoid overlapping deploys clobbering each other.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Publish out/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          force_orphan: true # keep the deploy branch a single clean commit
          # Preserve the dot-prefixed .htaccess from the export.
          enable_jekyll: true # skip auto-adding .nojekyll; not needed on Apache
          commit_message: "Deploy: ${{ github.sha }}"
